<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { width: 300px; padding: 15px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .status-box { 
            padding: 15px; 
            border-radius: 8px; 
            text-align: center; 
            color: white; 
            margin-bottom: 15px;
            display: none;
        }
        .safe { background-color: #28a745; }
        .danger { background-color: #dc3545; }
        .unknown { background-color: #6c757d; }
        
        h2 { margin: 0 0 10px 0; font-size: 18px; }
        p { margin: 5px 0; font-size: 14px; }
        
        button {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 4px;
            background-color: #f8f9fa;
            border: 1px solid #ddd;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background-color: #e2e6ea; }
        
        .url-text {
            word-break: break-all;
            color: #666;
            font-size: 12px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div id="loading">Analyzing...</div>
    
    <div id="status-safe" class="status-box safe">
        <h2>✅ Safe</h2>
        <p>No phishing detected</p>
        <p id="score-safe"></p>
    </div>
    
    <div id="status-danger" class="status-box danger">
        <h2>⚠️ Phishing!</h2>
        <p>This site looks malicious</p>
        <p id="score-danger"></p>
    </div>

    <div class="url-text" id="current-url"></div>
    
    <button id="btn-whitelist">Add to Whitelist</button>
    
    <script src="popup.js"></script>
</body>
</html>
